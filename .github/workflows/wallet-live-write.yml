name: Wallet Live Write

on:
  workflow_dispatch:

jobs:
  wallet-live-write:
    runs-on: ubuntu-latest
    environment: wallet-live-write
    env:
      WALLET_TOKEN: ${{ secrets.WALLET_TOKEN }}
      WALLET_LIVE_WRITE_ACCOUNT_ID: ${{ vars.WALLET_LIVE_WRITE_ACCOUNT_ID }}
      WALLET_LIVE_WRITE_TEST: ${{ vars.WALLET_LIVE_WRITE_TEST }}
      WALLET_LIVE_WRITE_CLEANUP: ${{ vars.WALLET_LIVE_WRITE_CLEANUP }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Run Wallet live write test
        run: npm run test:wallet:live
