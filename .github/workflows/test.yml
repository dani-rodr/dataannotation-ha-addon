name: Test

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  unit-and-fixture:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

      - name: Run fixture integration tests
        run: npm run test:integration:fixture

  live-integration:
    if: ${{ github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    env:
      DATAANNOTATION_EMAIL: ${{ secrets.DATAANNOTATION_EMAIL }}
      DATAANNOTATION_PASSWORD: ${{ secrets.DATAANNOTATION_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check live credentials
        id: credentials
        run: |
          if [ -n "${DATAANNOTATION_EMAIL:-}" ] && [ -n "${DATAANNOTATION_PASSWORD:-}" ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "Skipping live integration because repository secrets are not configured."
          fi

      - name: Setup Chrome
        if: steps.credentials.outputs.present == 'true'
        id: chrome
        uses: browser-actions/setup-chrome@v1
        with:
          install-dependencies: true

      - name: Run live integration test
        if: steps.credentials.outputs.present == 'true'
        env:
          PUPPETEER_EXECUTABLE_PATH: ${{ steps.chrome.outputs.chrome-path }}
        run: npm run test:integration:live
